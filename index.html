<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Rezepte</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Shadows+Into+Light&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', Arial, sans-serif;
            background-color: #f9f5f0;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            padding: 20px 40px;
            text-align: center;
        }

        header h1 {
            color: white;
            font-family: 'Lobster Two', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        h2 {
            font-family: 'Lobster Two', serif;
            color: #2c3e50;
            margin: 30px 0 15px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px 5px 5px 0;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d35400;
        }

        .rezepte-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .rezept-karte {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .rezept-karte:hover {
            transform: translateY(-5px);
        }

        .rezept-karte img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .rezept-karte-inhalt {
            padding: 15px;
        }

        .rezept-karte h3 {
            font-family: 'Lobster Two', serif;
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .rezept-meta {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 10px;
        }

        .rezept-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-bearbeiten {
            background-color: #2c3e50;
        }

        .btn-bearbeiten:hover {
            background-color: #1a252f;
        }

        .suche-filter {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .suche-filter input,
        .suche-filter select {
            margin: 0;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-row input,
        .form-row select,
        .form-row textarea {
            flex: 1;
            width: auto;
        }

        .form-gruppe {
            max-width: 600px;
        }

        @media (max-width: 600px) {
        .form-row {
            flex-direction: column;
        }

        .rezepte-grid {
            grid-template-columns: 1fr;
        }

        .suche-filter {
            flex-direction: column;
        }

        header h1 {
            font-size: 1.8rem;
        }

        button {
            width: 100%;
            margin: 5px 0;
        }

        .container {
            padding: 15px 10px;
        }
    }

    </style>
</head>
<body>
    <header>
        <h1>🍕 Meine Rezepte</h1>
    </header>

    <div class="container">

        <div id="login-bereich">
            <h2>Login</h2>
            <input id="login-username" type="text" placeholder="Username">
            <input id="login-passwort" type="password" placeholder="Passwort">
            <button onclick="login()">🔑 Login</button>
            <button onclick="zeigeRegistrierung()">📝 Registrieren</button>

            <div id="registrierung-bereich" style="display:none;">
                <h2>Registrieren</h2>
                <input id="reg-username" type="text" placeholder="Username">
                <input id="reg-email" type="email" placeholder="Email">
                <input id="reg-passwort" type="password" placeholder="Passwort">
                <button onclick="registrieren()">✅ Account erstellen</button>
            </div>
        </div>

        <div id="app-bereich" style="display:none;">

            <h2>Neues Rezept</h2>
            <div class="form-gruppe">
                <input id="titel" type="text" placeholder="Titel">
                <div class="form-row">
                    <select id="kategorie">
                        <option value="Pasta">Pasta</option>
                        <option value="Salat">Salat</option>
                        <option value="Auflauf">Auflauf</option>
                        <option value="Fleisch">Fleisch</option>
                        <option value="Fisch">Fisch</option>
                        <option value="Kuchen">Kuchen</option>
                        <option value="Dessert">Dessert</option>
                        <option value="vegetarisch">Vegetarisch</option>
                        <option value="schwäbisch">Schwäbisch</option>
                    </select>
                    <select id="schwierigkeit">
                        <option value="Einfach">Einfach</option>
                        <option value="Mittel">Mittel</option>
                        <option value="Schwer">Schwer</option>
                    </select>
                </div>
                <div class="form-row">
                    <input id="portionen" type="number" placeholder="Portionen">
                    <input id="zubereitungszeit" type="number" placeholder="Zubereitungszeit (Min)">
                </div>
                <textarea id="zutaten" rows="3" placeholder="Zutaten"></textarea>
                <textarea id="zubereitung" rows="5" placeholder="Zubereitung"></textarea>
                <div class="form-row">
                    <input id="foto" type="file" accept="image/*">
                    <button id="speichern-btn" onclick="rezeptSpeichern()">💾 Rezept speichern</button>
                </div>
            </div>

            <h2>Meine Rezepte</h2>
            <button onclick="rezepteHolen()">Rezepte laden</button>
            <div class="suche-filter">
                <input id="suche" type="text" placeholder="🔍 Rezept suchen..." onkeyup="rezepteSuchen()">
                <select id="filter-kategorie" onchange="rezepteFiltern()">
                    <option value="">Alle Kategorien</option>
                    <option value="Pasta">Pasta</option>
                    <option value="Salat">Salat</option>
                    <option value="Auflauf">Auflauf</option>
                    <option value="Fleisch">Fleisch</option>
                    <option value="Fisch">Fisch</option>
                    <option value="Kuchen">Kuchen</option>
                    <option value="Dessert">Dessert</option>
                    <option value="vegetarisch">Vegetarisch</option>
                    <option value="schwäbisch">Schwäbisch</option>
                </select>
            </div>
            <div id="rezepte-liste" class="rezepte-grid"></div>

        </div><!-- app-bereich Ende -->

    </div><!-- container Ende -->

    <script>
        window.onload = async function() {
            const antwort = await fetch("https://web-production-a5f03.up.railway.app/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: "Patoleox", passwort: "FabregaS44!?"})
            });
            const data = await antwort.json();
            console.log("Token:", data.token);

            const rezepte = await fetch("https://web-production-a5f03.up.railway.app/rezepte", {
                headers: {"Authorization": `Bearer ${data.token}`}
            });
            const rData = await rezepte.json();
            console.log("Rezepte:", JSON.stringify(rData));
        }

        let token = null;
        let aktuelleId = null;
        let alleRezepte = [];

        function zeilenUmbrueche(text) {
            return text ? text.replace(/\n/g, '<br>') : '';
        }

        function karteHTML(rezept) {
            return `
                <div class="rezept-karte">
                    ${rezept.foto ? `<img src="https://web-production-a5f03.up.railway.app${rezept.foto}">` : ""}
                    <div class="rezept-karte-inhalt">
                        <h3>${rezept.titel}</h3>
                        <p class="rezept-meta">📂 ${rezept.kategorie} | ⭐ ${rezept.schwierigkeit} | 👥 ${rezept.portionen} Portionen | ⏰ ${rezept.zubereitungszeit} Min</p>
                        <h4>Zutaten:</h4>
                        <p>${zeilenUmbrueche(rezept.zutaten)}</p>
                        <h4>Zubereitung:</h4>
                        <p>${zeilenUmbrueche(rezept.zubereitung)}</p>
                        <div class="rezept-buttons">
                            <button class="btn-bearbeiten" onclick="rezeptBearbeiten(${rezept.id})">✏️ Bearbeiten</button>
                            <button onclick="rezeptLoeschen(${rezept.id})">🗑️ Löschen</button>
                        </div>
                    </div>
                </div>`;
        }

        async function rezepteHolen() {
            const antwort = await fetch("https://web-production-a5f03.up.railway.app/rezepte", {
                headers: {"Authorization": `Bearer ${token}`}
            });
            alleRezepte = await antwort.json();
            const liste = document.getElementById("rezepte-liste");
            liste.innerHTML = "";
            alleRezepte.forEach(rezept => {
                liste.innerHTML += karteHTML(rezept);
            });
        }

        async function rezeptHinzufuegen() {
            const fotoDatei = document.getElementById("foto").files[0];
            let fotoUrl = "";
            if (fotoDatei) {
                const formData = new FormData();
                formData.append("datei", fotoDatei);
                const fotoAntwort = await fetch("https://web-production-a5f03.up.railway.app/upload-foto", {
                    method: "POST",
                    body: formData
                });
                const fotoData = await fotoAntwort.json();
                fotoUrl = fotoData.foto_url;
            }
            const rezept = {
                titel: document.getElementById("titel").value,
                kategorie: document.getElementById("kategorie").value,
                schwierigkeit: document.getElementById("schwierigkeit").value,
                portionen: parseInt(document.getElementById("portionen").value),
                zubereitungszeit: parseInt(document.getElementById("zubereitungszeit").value),
                zutaten: document.getElementById("zutaten").value,
                zubereitung: document.getElementById("zubereitung").value,
                foto: fotoUrl
            };
            await fetch("https://web-production-a5f03.up.railway.app/rezepte", {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": `Bearer ${token}`},
                body: JSON.stringify(rezept)
            });
            document.getElementById("titel").value = "";
            document.getElementById("portionen").value = "";
            document.getElementById("zubereitungszeit").value = "";
            document.getElementById("zutaten").value = "";
            document.getElementById("zubereitung").value = "";
            document.getElementById("foto").value = "";
            rezepteHolen();
        }

        async function rezeptLoeschen(id) {
            await fetch(`https://web-production-a5f03.up.railway.app/rezepte/${id}`, {
                method: "DELETE",
                headers: {"Authorization": `Bearer ${token}`}
            });
            rezepteHolen();
        }

        async function rezepteSuchen() {
            const suchbegriff = document.getElementById("suche").value.toLowerCase();
            const gefiltert = alleRezepte.filter(rezept =>
                rezept.titel.toLowerCase().includes(suchbegriff) ||
                rezept.kategorie.toLowerCase().includes(suchbegriff)
            );
            const liste = document.getElementById("rezepte-liste");
            liste.innerHTML = "";
            gefiltert.forEach(rezept => { liste.innerHTML += karteHTML(rezept); });
        }

        async function rezepteFiltern() {
            const kategorie = document.getElementById("filter-kategorie").value;
            const gefiltert = kategorie === "" ? alleRezepte : alleRezepte.filter(r => r.kategorie === kategorie);
            const liste = document.getElementById("rezepte-liste");
            liste.innerHTML = "";
            gefiltert.forEach(rezept => { liste.innerHTML += karteHTML(rezept); });
        }

        function rezeptBearbeiten(id) {
            const rezept = alleRezepte.find(r => r.id === id);
            aktuelleId = id;
            document.getElementById("titel").value = rezept.titel;
            document.getElementById("kategorie").value = rezept.kategorie;
            document.getElementById("schwierigkeit").value = rezept.schwierigkeit;
            document.getElementById("portionen").value = rezept.portionen;
            document.getElementById("zubereitungszeit").value = rezept.zubereitungszeit;
            document.getElementById("zutaten").value = rezept.zutaten;
            document.getElementById("zubereitung").value = rezept.zubereitung;
            document.getElementById("speichern-btn").textContent = "✏️ Aktualisieren";
            window.scrollTo(0, 0);
        }

        async function rezeptSpeichern() {
            if (aktuelleId) {
                await rezeptAktualisieren();
            } else {
                await rezeptHinzufuegen();
            }
        }

        async function rezeptAktualisieren() {
            const rezept = {
                titel: document.getElementById("titel").value,
                kategorie: document.getElementById("kategorie").value,
                schwierigkeit: document.getElementById("schwierigkeit").value,
                portionen: parseInt(document.getElementById("portionen").value),
                zubereitungszeit: parseInt(document.getElementById("zubereitungszeit").value),
                zutaten: document.getElementById("zutaten").value,
                zubereitung: document.getElementById("zubereitung").value,
                foto: ""
            };
            await fetch(`https://web-production-a5f03.up.railway.app/rezepte/${aktuelleId}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json", "Authorization": `Bearer ${token}`},
                body: JSON.stringify(rezept)
            });
            aktuelleId = null;
            document.getElementById("speichern-btn").textContent = "Rezept speichern";
            rezepteHolen();
        }

        async function login() {
            const username = document.getElementById("login-username").value;
            const passwort = document.getElementById("login-passwort").value;
            const antwort = await fetch("https://web-production-a5f03.up.railway.app/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, passwort})
            });
            const data = await antwort.json();
            if (data.token) {
                token = data.token;
                document.getElementById("login-bereich").style.display = "none";
                document.getElementById("app-bereich").style.display = "block";
                rezepteHolen();
            } else {
                alert("Falscher Username oder Passwort");
            }
        }

        function zeigeRegistrierung() {
            const bereich = document.getElementById("registrierung-bereich");
            if (bereich) {
                bereich.style.display = bereich.style.display === "none" ? "block" : "none";
            }
        }

        async function registrieren() {
            const username = document.getElementById("reg-username").value;
            const email = document.getElementById("reg-email").value;
            const passwort = document.getElementById("reg-passwort").value;
            const antwort = await fetch("https://web-production-a5f03.up.railway.app/registrieren", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, email, passwort})
            });
            const data = await antwort.json();
            if (data.nachricht) {
                alert("Account erstellt! Bitte einloggen.");
                zeigeRegistrierung();
            } else {
                alert(data.fehler);
            }
        }
    </script>
  </div>
</body>
</html>
